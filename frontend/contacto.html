<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contacto - MatchCotas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="main-header d-flex justify-content-between align-items-center px-4 py-2">
        <img src="img/logo.png" alt="Logo MatchCotas" class="logo">

        <nav>
            <a href="index.html">Inicio</a>
            <a href="sucursales.html">Sucursales</a>
            <a href="contacto.html">Contacto</a>
        </nav>
    </header>

    <main class="container py-5">

        <h1 class="text-center mb-4">Formulario de adopción</h1>

        <form class="formulario mx-auto">

            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre completo</label>
                <input type="text" class="form-control" id="nombre" placeholder="Ingresa tu nombre">
            </div>

            <div class="mb-3">
                <label for="correo" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="correo" placeholder="correo@ejemplo.com">
            </div>

            <div class="mb-3">
                <label for="mascota" class="form-label">Mascota de interés</label>
                <select class="form-select" id="mascota">
                    <option selected>Selecciona una opción</option>
                    <option>Sabina</option>
                    <option>Honorio</option>
                    <option>Tránsito</option>
                    <option>Higinio</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="mensaje" class="form-label">Mensaje</label>
                <textarea class="form-control" id="mensaje" rows="4" placeholder="Cuéntanos por qué quieres adoptar"></textarea>
            </div>

            <button type="submit" class="btn btn-warning">Enviar solicitud</button>

        </form>

    </main>

    <footer class="text-center py-4">
        <p>© 2026 MatchCotas - Centro de adopción de mascotas</p>
    </footer>

</body>

</html>
